<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBTI - Debug Info</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Monaco', 'Courier New', monospace;
            background: #1a1a1a;
            color: #00ff00;
            padding: 20px;
        }
        h1 {
            color: #00ffff;
            margin-bottom: 20px;
        }
        .section {
            background: #2a2a2a;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 2px solid #00ff00;
        }
        .status {
            margin: 10px 0;
        }
        .ok { color: #00ff00; }
        .error { color: #ff0000; }
        .warning { color: #ffaa00; }
        button {
            background: #00ff00;
            color: #1a1a1a;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin: 5px;
        }
        button:hover {
            background: #00ffff;
        }
        #console {
            background: #0a0a0a;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>🔍 CBTI 게임 디버그 정보</h1>

    <div class="section">
        <h2>📊 시스템 체크</h2>
        <div id="system-check"></div>
    </div>

    <div class="section">
        <h2>🎮 빠른 테스트</h2>
        <button onclick="testReact()">React 테스트</button>
        <button onclick="testThree()">Three.js 테스트</button>
        <button onclick="testWebGL()">WebGL 테스트</button>
        <button onclick="location.href='/'">메인으로</button>
    </div>

    <div class="section">
        <h2>📝 콘솔 로그</h2>
        <div id="console"></div>
    </div>

    <script>
        // 콘솔 캡처
        const consoleDiv = document.getElementById('console');
        const originalLog = console.log;
        const originalError = console.error;

        console.log = function(...args) {
            originalLog.apply(console, args);
            consoleDiv.innerHTML += '<div class="ok">LOG: ' + args.join(' ') + '</div>';
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            consoleDiv.innerHTML += '<div class="error">ERROR: ' + args.join(' ') + '</div>';
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        };

        // 시스템 체크
        function checkSystem() {
            const checks = document.getElementById('system-check');
            let html = '';

            // WebGL 체크
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            html += `<div class="status ${gl ? 'ok' : 'error'}">
                ✓ WebGL: ${gl ? 'OK' : 'NOT SUPPORTED'}
            </div>`;

            // GPU 정보
            if (gl) {
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                if (debugInfo) {
                    const vendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                    const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                    html += `<div class="status ok">GPU: ${renderer}</div>`;
                }
            }

            // 브라우저 정보
            html += `<div class="status ok">Browser: ${navigator.userAgent}</div>`;
            html += `<div class="status ok">Screen: ${window.screen.width}x${window.screen.height}</div>`;
            html += `<div class="status ok">Viewport: ${window.innerWidth}x${window.innerHeight}</div>`;

            // 메모리 (Chrome만)
            if (performance.memory) {
                const used = (performance.memory.usedJSHeapSize / 1048576).toFixed(2);
                const total = (performance.memory.totalJSHeapSize / 1048576).toFixed(2);
                html += `<div class="status ok">Memory: ${used}MB / ${total}MB</div>`;
            }

            checks.innerHTML = html;
        }

        // React 테스트
        function testReact() {
            console.log('Testing React...');
            fetch('/src/App.jsx')
                .then(r => r.text())
                .then(code => {
                    console.log('✓ React App.jsx loaded');
                    console.log('File size:', code.length, 'bytes');
                })
                .catch(e => console.error('✗ React test failed:', e));
        }

        // Three.js 테스트
        function testThree() {
            console.log('Testing Three.js...');
            import('three').then(THREE => {
                console.log('✓ Three.js loaded');
                console.log('Version:', THREE.REVISION);

                // 간단한 씬 생성
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer();
                console.log('✓ Basic scene created');
            }).catch(e => console.error('✗ Three.js test failed:', e));
        }

        // WebGL 테스트
        function testWebGL() {
            console.log('Testing WebGL...');
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

            if (!gl) {
                console.error('✗ WebGL not supported');
                return;
            }

            console.log('✓ WebGL context created');
            console.log('Version:', gl.getParameter(gl.VERSION));
            console.log('Vendor:', gl.getParameter(gl.VENDOR));
            console.log('Max Texture Size:', gl.getParameter(gl.MAX_TEXTURE_SIZE));
            console.log('Max Vertex Attributes:', gl.getParameter(gl.MAX_VERTEX_ATTRIBS));
        }

        // 페이지 로드 시 체크
        checkSystem();
        console.log('Debug page loaded');
    </script>
</body>
</html>
